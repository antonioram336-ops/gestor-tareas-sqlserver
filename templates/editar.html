{% extends 'base.html' %}

{% block content %}
<h2>Modificar tarea</h2>

<form action="/actualizar/{{ tarea.id }}" method="POST" class="formulario">
    <input 
        type="text" 
        name="titulo" 
        value="{{ tarea.titulo }}" 
        placeholder="Título de la tarea" 
        required
    >

    <textarea 
        name="descripcion" 
        placeholder="Descripción de la tarea"
    >{{ tarea.descripcion }}</textarea>

    <button type="submit">Guardar cambios</button>
</form>

<div class="centrado">
    <a href="/" class="btn volver">Volver</a>
</div>
{% endblock %}
